<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTEN - Jumpei Kaneko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">JUMPEI KANEKO</a>
            <button id="menu-btn" class="mobile-menu-button">MENU</button>
        </div>
    </header>
    <div id="mobile-menu" class="mobile-menu-panel"></div>

    <main class="main-content">
        <section class="fade-in-section work-detail-wrapper">
            
            <div class="work-detail-header">
                <h1 class="work-detail-title">PROTEN</h1>
                <div class="work-detail-meta">
                    <p>2025 / Product</p>
                    <p>tornad2025 企業賞 受賞</p>
                </div>
            </div>

            <img src="images/proten-main.jpg" alt="PROTEN" class="work-detail-image-main">

            <div class="work-detail-text">
                <p>PROTEN は、筋トレ初心者向けのSNS ×マッチングアプリだ。「一人では筋トレが続かない」という悩みを解決するため、同じジムに通う仲間と簡単につながり、一緒にトレーニングする「合トレ」を可能にする。</p>
                <p>また、SNS 投稿機能で他の仲間と頑張りをシェアしたり、自分の努力を記録したりすることで、モチベーションを維持する。</p>
                <p>孤独になりがちな筋トレを「仲間と楽しむ」体験に変え、「挫折しない」筋トレを実現する。</p>
            </div>

            <div class="work-detail-images-sub">
                <img src="images/proten-sub1.jpg" alt="アプリ画面1">
                <img src="images/proten-sub2.jpg" alt="アプリ画面2">
            </div>

            <div class="text-center">
                <a href="work.html" class="back-link">← Back to Work</a>
            </div>
        </section>
    </main>

    <footer class="site-footer"><p>&copy; <span id="year"></span> JUMPEI KANEKO</p></footer>
    <script src="script.js" defer></script>
