<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あの時という音楽 - Jumpei Kaneko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">JUMPEI KANEKO</a>
            <button id="menu-btn" class="mobile-menu-button">MENU</button>
        </div>
    </header>
    <div id="mobile-menu" class="mobile-menu-panel"></div>

    <main class="main-content">
        <section class="fade-in-section work-detail-wrapper">
            
            <div class="work-detail-header">
                <h1 class="work-detail-title">あの時という音楽</h1>
                <div class="work-detail-meta">
                    <p>2025 / Sound Project</p>
                </div>
            </div>

            <img src="images/anotoki-main.jpg" alt="あの時という音楽" class="work-detail-image-main">

            <div class="work-detail-text">
                <p>ある日見つけた、昔の写真。そこに宿る懐かしさに、新たなサウンドスケープを付け直すことで、記憶と今を繋ぐ音楽を作り出せないかと考える。</p>
                <p>これは単なるノスタルジーの再現ではない。音という身体的な感覚を介して、失われた時間を現在に呼び戻し、欠落した記憶の空白を「いま・ここ」の響きとして接続する。</p>
                <p>変容し続ける都市と自己の間に、確かな手触りを取り戻すための試みである。</p>
            </div>

            <div class="work-detail-images-sub">
                <img src="images/anotoki-sub1.jpg" alt="プロセス1">
                <img src="images/anotoki-sub2.jpg" alt="プロセス2">
            </div>

            <div class="text-center">
                <a href="work.html" class="back-link">← Back to Work</a>
            </div>
        </section>
    </main>

    <footer class="site-footer"><p>&copy; <span id="year"></span> JUMPEI KANEKO</p></footer>
    <script src="script.js" defer></script>
</body>
</html>
