<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生のための放課後ミュージアム - Jumpei Kaneko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">JUMPEI KANEKO</a>
            <button id="menu-btn" class="mobile-menu-button">MENU</button>
        </div>
    </header>
    <div id="mobile-menu" class="mobile-menu-panel"></div>

    <main class="main-content">
        <section class="fade-in-section work-detail-wrapper">
            
            <div class="work-detail-header">
                <h1 class="work-detail-title">大学生のための放課後ミュージアム</h1>
                <div class="work-detail-meta">
                    <p>2025 / Workshop</p>
                    <p>東京都美術館 とびらプロジェクト</p>
                </div>
            </div>

            <img src="images/museum-main.jpg" alt="放課後ミュージアム" class="work-detail-image-main">

            <div class="work-detail-text">
                <p>東京都美術館「とびらプロジェクト」のアート・コミュニケータとして、自ら企画を立案し、運営メンバーを募ってプロジェクトチームを組成。</p>
                <p>大学生・専門学生・大学院生を対象とした鑑賞プログラムをゼロから立ち上げた。iPadを用いたコラージュ制作や対話型鑑賞を組み合わせ、参加者が能動的に作品に関われる仕組みを構築した。</p>
                <p>企画書の作成から広報、当日の運営指揮までを一貫して担当した。</p>
            </div>

            <div class="work-detail-images-sub">
                <img src="images/museum-sub1.jpg" alt="ワークショップ風景1">
                <img src="images/museum-sub2.jpg" alt="ワークショップ風景2">
            </div>

            <div class="text-center">
                <a href="work.html" class="back-link">← Back to Work</a>
            </div>
        </section>
    </main>

    <footer class="site-footer"><p>&copy; <span id="year"></span> JUMPEI KANEKO</p></footer>
    <script src="script.js" defer></script>
</body>
</html>
