<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印象派絵画の音を聴く - Jumpei Kaneko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">JUMPEI KANEKO</a>
            <button id="menu-btn" class="mobile-menu-button">MENU</button>
        </div>
    </header>
    <div id="mobile-menu" class="mobile-menu-panel"></div>

    <main class="main-content">
        <section class="fade-in-section work-detail-wrapper">
            
            <div class="work-detail-header">
                <h1 class="work-detail-title">印象派絵画の音を聴く</h1>
                <div class="work-detail-meta">
                    <p>2026 / Sound Project</p>
                </div>
            </div>

            <img src="images/insho-main.jpg" alt="印象派絵画の音を聴く" class="work-detail-image-main">

            <div class="work-detail-text">
                <p>本プロジェクトは、人文学的な印象派研究との接続から「耳で聞く絵画」を創り出す試みである。</p>
                <p>体験は作家が創作した音世界と物理空間を往来し、展示においては木製額縁そのものを振動スピーカーとして鳴らす。</p>
                <p>木枠という物質の震えを通して音を空間に流すことで、両空間で「感じられること/感じられないこと」を接続し、アート・コミュニケーションの視点から「日常の再構築」を探求する。</p>
            </div>

            <div class="work-detail-images-sub">
                <img src="images/insho-sub1.jpg" alt="プロセス1">
                <img src="images/insho-sub2.jpg" alt="プロセス2">
            </div>

            <div class="text-center">
                <a href="work.html" class="back-link">← Back to Work</a>
            </div>
        </section>
    </main>

    <footer class="site-footer"><p>&copy; <span id="year"></span> JUMPEI KANEKO</p></footer>
